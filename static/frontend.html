<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TweakBot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
  position: relative;
}

.user {
  background: #1f1f1f;
  align-self: flex-end;
}

.bot {
  background: #111;
  border: 1px solid #222;
}

.actions {
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.6;
}

.actions span {
  margin-right: 10px;
  cursor: pointer;
}

#inputBar {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
  border-radius: 8px;
}

#send {
  margin-left: 10px;
  padding: 10px 15px;
  background: red;
  border: none;
  border-radius: 8px;
  color: white;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBar">
  <input id="input" placeholder="Talk to TweakBot..." />
  <button id="send">Send</button>
</div>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("input")
const sendBtn = document.getElementById("send")

// ❌ Prevent Enter from sending (iPhone fix)
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault()
  }
})

sendBtn.onclick = sendMessage

async function sendMessage() {
  const text = input.value.trim()
  if (!text) return

  addMessage(text, "user")
  input.value = ""

  const botMsg = addMessage("...", "bot")

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    })

    const data = await res.json()
    botMsg.querySelector(".content").textContent = data.reply || "No response"
  } catch (err) {
    botMsg.querySelector(".content").textContent = "Error talking to bot"
  }
}

function addMessage(text, type) {
  const div = document.createElement("div")
  div.className = "message " + type

  div.innerHTML = `
    <div class="content">${escapeHtml(text)}</div>
    <div class="actions">
      <span onclick="copyMsg(this)">Copy</span>
      <span onclick="shareMsg(this)">Share</span>
    </div>
  `

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  return div
}

function copyMsg(el) {
  const text = el.parentElement.parentElement.querySelector(".content").textContent
  navigator.clipboard.writeText(text)
}

function shareMsg(el) {
  const text = el.parentElement.parentElement.querySelector(".content").textContent

  if (navigator.share) {
    navigator.share({ text })
  } else {
    alert("Sharing not supported on this device")
  }
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, (m) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  })[m])
}
</script>

</body>
</html>
